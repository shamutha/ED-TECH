services:
  mongodb:
    image: mongo:latest
    container_name: shamutha-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # mongo:6+ ships `mongosh` (the legacy `mongo` shell was removed)
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:alpine
    container_name: shamutha-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    container_name: shamutha-server
    ports:
      - "5010:5001"
    environment:
      - PORT=5001
      # Self-contained: talk to the local mongodb service over the compose network.
      # (Container port 27017 — NOT the 27018 host mapping.)
      - MONGO_URI=mongodb://mongodb:27017/shamuthaEdTech
      - REDIS_URL=redis://redis:6379
      # Payment keys are optional. Leave unset → server returns mock orders so the
      # app still runs end-to-end. Override via a root .env file or shell env.
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        # Must match RAZORPAY_KEY_ID above (Vite inlines it into the build).
        VITE_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
    container_name: shamutha-client
    ports:
      - "3010:80"
    depends_on:
      - server

volumes:
  mongo-data:
