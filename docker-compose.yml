version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: shamutha-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: shamutha-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    container_name: shamutha-server
    ports:
      - "5010:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27018/shamutha
      - REDIS_URL=redis://redis:6380
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: ./client
    container_name: shamutha-client
    ports:
      - "3010:3000"
    depends_on:
      - server

volumes:
  mongo-data:
